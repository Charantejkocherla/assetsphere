<sly data-sly-use.Banner = "com.spheredigital.assetsphere.core.models.BannerModel">
	<div class="banner">
	    <p>${Banner.bannerImage}</p>

	<img class="banner-image"
	     src="${Banner.bannerImage @ context='uri'}"
	     alt="Banner"/>

	    <div class="banner-overlay">
	        <h1>${Banner.heading}</h1>

	        <p>${Banner.description}</p>

	        <div class="banner-buttons">
	            <button>${Banner.buttonOne}</button>
	            <button>${Banner.buttonTwo}</button>
	        </div>
	    </div>
</sly>
